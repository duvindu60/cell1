name: Docker Build and Deploy

on:
  push:
    branches:
      - test
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: duvindu60/cellapp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: meta
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  deploy-test:
    name: deploy-test
    needs: build-and-push
    if: github.ref == 'refs/heads/test'
    runs-on: [self-hosted, test-sever]
    steps:
      - name: Deploy test container
        run: |
          IMAGE="${{ needs.build-and-push.outputs.image }}"
          docker pull "$IMAGE"
          docker rm -f cellapp-test || true
          docker run -d \
            --name cellapp-test \
            --restart unless-stopped \
            --env-file /var/www/cellapp/.env \
            -p 8000:5001 \
            "$IMAGE"

  deploy-production:
    name: deploy-production
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy production container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY_PROD }}
          script: |
            IMAGE="${{ needs.build-and-push.outputs.image }}"
            docker pull "$IMAGE"
            docker rm -f cellapp-prod || true
            docker run -d \
              --name cellapp-prod \
              --restart unless-stopped \
              --env-file /var/www/cellapp/.env \
              -p 8000:5001 \
              "$IMAGE"
