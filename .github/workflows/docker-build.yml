name: Docker Build and Deploy

on:
  push:
    branches:
      - test
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: duvindu60/cellapp
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: meta
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Deploy Test (cellapp-test) — existing, no change
  # ---------------------------------------------------------------------------
  deploy-test:
    name: deploy-test
    needs: build-and-push
    if: github.ref == 'refs/heads/test'
    runs-on: [self-hosted, test-sever]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy cellapp-test container
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_PAT: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
        run: |
          set -e
          OWNER_LOWER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          if [ -n "$GHCR_PAT" ] && [ -n "$GHCR_USER" ]; then
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          else
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$OWNER_LOWER" --password-stdin
          fi
          IMAGE="${{ needs.build-and-push.outputs.image }}"
          docker pull "$IMAGE"
          docker rm -f cellapp-test || true
          docker run -d \
            --name cellapp-test \
            --restart unless-stopped \
            --env-file /var/www/cellapp/.env \
            -p 8000:5001 \
            "$IMAGE"

  # ---------------------------------------------------------------------------
  # Deploy SG (cellapp-sg) — NEW, same runner, different env file + port
  # ---------------------------------------------------------------------------
  deploy-sg:
    name: deploy-sg
    needs: build-and-push
    if: github.ref == 'refs/heads/test'
    runs-on: [self-hosted, test-sever]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy cellapp-sg container
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_PAT: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
        run: |
          set -e
          OWNER_LOWER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          if [ -n "$GHCR_PAT" ] && [ -n "$GHCR_USER" ]; then
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          else
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$OWNER_LOWER" --password-stdin
          fi
          IMAGE="${{ needs.build-and-push.outputs.image }}"
          docker pull "$IMAGE"
          docker rm -f cellapp-sg || true
          docker run -d \
            --name cellapp-sg \
            --restart unless-stopped \
            --env-file /var/www/cellapp-sg/.env \
            -p 8002:5001 \
            "$IMAGE"

  # ---------------------------------------------------------------------------
  # Deploy Production (cellapp-prod) — self-hosted runner on prod VM
  # ---------------------------------------------------------------------------
  deploy-production:
    name: deploy-production
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, prod-server]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy cellapp-prod container
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_PAT: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
        run: |
          set -e
          OWNER_LOWER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          if [ -n "$GHCR_PAT" ] && [ -n "$GHCR_USER" ]; then
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          else
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$OWNER_LOWER" --password-stdin
          fi
          IMAGE="${{ needs.build-and-push.outputs.image }}"
          docker pull "$IMAGE"
          docker rm -f cellapp-prod || true
          docker run -d \
            --name cellapp-prod \
            --restart unless-stopped \
            --env-file /var/www/cellapp/.env \
            -p 8001:5001 \
            "$IMAGE"